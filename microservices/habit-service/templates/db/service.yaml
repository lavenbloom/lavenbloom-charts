apiVersion: v1
kind: Service
metadata:
  name: habit-db
  namespace: {{ .Values.db.namespace }}
  labels:
    app: habit-db
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.db.port }}
      targetPort: {{ .Values.db.port }}
  selector:
    app: habit-db
---
apiVersion: v1
kind: Service
metadata:
  name: habit-db-headless
  namespace: {{ .Values.db.namespace }}
  labels:
    app: habit-db
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.db.port }}
      targetPort: {{ .Values.db.port }}
  selector:
    app: habit-db

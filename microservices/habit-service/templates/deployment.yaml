apiVersion: apps/v1
kind: Deployment
metadata:
  name: habit-service
  namespace: {{ .Values.habit.namespace }}
  labels:
    app: habit-service
    tier: backend
spec:
  replicas: {{ .Values.habit.replicas }}
  selector:
    matchLabels:
      app: habit-service
  template:
    metadata:
      labels:
        app: habit-service
        tier: backend
    spec:
      containers:
        - name: habit-service
          image: "{{ .Values.habit.image }}:{{ .Values.global.imageTag }}"
          ports:
            - containerPort: {{ .Values.habit.port }}
          envFrom:
            - secretRef:
                name: habit-service-secret
          resources:
            requests:
              cpu: {{ .Values.habit.resources.requests.cpu }}
              memory: {{ .Values.habit.resources.requests.memory }}
            limits:
              cpu: {{ .Values.habit.resources.limits.cpu }}
              memory: {{ .Values.habit.resources.limits.memory }}

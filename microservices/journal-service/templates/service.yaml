apiVersion: v1
kind: Service
metadata:
  name: journal-service
  namespace: {{ .Values.journalService.namespace }}
  labels:
    app: journal-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.journalService.port }}
      targetPort: {{ .Values.journalService.port }}
  selector:
    app: journal-service

apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ .Values.redis.namespace }}
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.redis.port }}
      targetPort: {{ .Values.redis.port }}
  selector:
    app: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: {{ .Values.redis.namespace }}
  labels:
    app: redis
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.redis.port }}
      targetPort: {{ .Values.redis.port }}
  selector:
    app: redis

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: notification-route
  namespace: {{ .Values.routes.notification.backendNamespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.routes.notification.parentGatewayNamespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.routes.notification.pathPrefix }}
      backendRefs:
        - name: {{ .Values.routes.notification.backendService }}
          namespace: {{ .Values.routes.notification.backendNamespace }}
          port: {{ .Values.routes.notification.backendPort }}

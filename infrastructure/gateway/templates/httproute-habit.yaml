apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: habit-route
  namespace: {{ .Values.routes.habit.backendNamespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.routes.habit.parentGatewayNamespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.routes.habit.pathPrefix }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ .Values.routes.habit.backendService }}
          namespace: {{ .Values.routes.habit.backendNamespace }}
          port: {{ .Values.routes.habit.backendPort }}

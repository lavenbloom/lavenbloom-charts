apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: journal-route
  namespace: {{ .Values.routes.journal.backendNamespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.routes.journal.parentGatewayNamespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.routes.journal.pathPrefix }}
      backendRefs:
        - name: {{ .Values.routes.journal.backendService }}
          namespace: {{ .Values.routes.journal.backendNamespace }}
          port: {{ .Values.routes.journal.backendPort }}

# Default deny all ingress in backend namespace (no lateral traffic)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-default-deny
  namespace: {{ .Values.backendNamespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress


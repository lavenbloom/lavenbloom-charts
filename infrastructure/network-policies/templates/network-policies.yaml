# Backend services: only accept ingress from gateway namespace
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-allow-gateway-only
  namespace: {{ .Values.backendNamespace }}
spec:
  podSelector:
    matchLabels:
      tier: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Values.gatewayNamespace }}

# Frontend: only accept ingress from gateway namespace
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-allow-gateway-only
  namespace: {{ .Values.frontendNamespace }}
spec:
  podSelector:
    matchLabels:
      tier: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Values.gatewayNamespace }}

# Auth DB: only accept ingress from auth-service
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-db-allow-auth-service-only
  namespace: {{ .Values.dbNamespace }}
spec:
  podSelector:
    matchLabels:
      app: auth-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Values.backendNamespace }}
          podSelector:
            matchLabels:
              app: auth-service


# -- kube-prometheus-stack configuration --
kube-prometheus-stack:
  grafana:
    enabled: true
    adminUser: admin
    adminPassword: admin

    service:
      type: NodePort
      nodePort: 30300

    # Register Loki as a datasource in Grafana
    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki-gateway.monitoring.svc.cluster.local:80
        jsonData:
          maxLines: 1000

  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec: {}
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false

  alertmanager:
    enabled: false

  nodeExporter:
    enabled: true

  kubeStateMetrics:
    enabled: true

# -- Loki configuration (single binary / simple scalable) --
loki:
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    storage:
      type: filesystem

  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 10Gi

  gateway:
    enabled: true

  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0

  chunksCache:
    enabled: false
  resultsCache:
    enabled: false

# -- Promtail configuration (log collector shipping to Loki) --
promtail:
  config:
    clients:
      - url: http://loki-gateway.monitoring.svc.cluster.local:80/loki/api/v1/push
